name: Add CBMC formula

on:
  schedule:
    - cron: "0 */6 * * *" # Run this every 6 hours
  workflow_dispatch:      # Allow manual dispatching for a custom branch / tag.

permissions:
  checks: write
  contents: write
  pull-requests: write

jobs:
  create-formula-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Obtain latest CBMC release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CBMC_LATEST=$(gh -R diffblue/cbmc release list | grep Latest | awk '{print $1}' | cut -f2 -d-)
          echo "CBMC_LATEST: ${CBMC_LATEST}"
          echo "CBMC_LATEST=${CBMC_LATEST}" >> "${GITHUB_ENV}"
          # check whether we already have the formula
          if [ -e "Formula/cbmc@${CBMC_LATEST}.rb" ] ; then
            echo "Formula already exists"
            echo "next_step=none" >> "${GITHUB_ENV}"
          # check whether we already have a PR for the formula. A manual
          # (workflow_dispatch) run is allowed to regenerate over an existing
          # branch, so that a failed/incomplete attempt can be re-driven
          # without first having to delete the branch by hand.
          elif [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] && \
               git ls-remote --exit-code origin "cbmc-${CBMC_LATEST}" ; then
            echo "Branch cbmc-${CBMC_LATEST} already exists"
            echo "next_step=none" >> "${GITHUB_ENV}"
          else
            echo "next_step=check_brew" >> "${GITHUB_ENV}"
          fi

      - name: Set up Homebrew
        if: ${{ env.next_step == 'check_brew' }}
        uses: Homebrew/actions/setup-homebrew@main

      - name: Check CBMC version in brew
        if: ${{ env.next_step == 'check_brew' }}
        run: |
          brew update
          CBMC_BREW=$(brew info cbmc --json | jq -r '.[0].versions.stable')
          echo "CBMC_BREW: ${CBMC_BREW}"
          if [ "${CBMC_BREW}" = "${CBMC_LATEST}" ] ; then
            # transform_binary.sh derives the complete formula from
            # Homebrew-core's cbmc.rb (class name + re-hosted bottle block only)
            # and leaves the re-hosted bottle tarballs in the working directory.
            ./transform_binary.sh "${CBMC_LATEST}" > "Formula/cbmc@${CBMC_LATEST}.rb"
            echo "next_step=upload_and_create_pr" >> "${GITHUB_ENV}"
          else
            echo "next_step=none" >> "${GITHUB_ENV}"
          fi

      - name: Verify generated formula
        if: ${{ env.next_step == 'upload_and_create_pr' }}
        run: |
          formula="Formula/cbmc@${CBMC_LATEST}.rb"
          # The regenerated bottle set must cover every platform Homebrew-core
          # ships. If it does not (e.g. Homebrew-core has not finished
          # publishing all bottles yet), abort so that a later scheduled run
          # retries, rather than opening a PR limited to a subset of platforms.
          # Count the bottle tags Homebrew-core ships. `brew formula` prints a
          # path only when the core tap is checked out locally; under Homebrew's
          # default API mode (as on CI) it prints nothing, so fetch the formula
          # from GitHub instead.
          core_rb="$(mktemp)"
          curl -fsSL "https://raw.githubusercontent.com/Homebrew/homebrew-core/master/Formula/c/cbmc.rb" -o "${core_rb}"
          expected=$(grep -cE '^[[:space:]]+sha256 ' "${core_rb}")
          got=$(grep -cE '^[[:space:]]+sha256 ' "${formula}")
          echo "bottle tags: expected=${expected} got=${got}"
          if [ "${got}" -ne "${expected}" ] || [ "${got}" -lt 2 ] ; then
            echo "::error ::Generated formula has ${got} bottle(s) but Homebrew-core has ${expected}; aborting to retry later."
            exit 1
          fi
          # Catch formatting problems (e.g. Layout/ExtraSpacing) before the PR.
          brew style "${formula}"

      - name: Upload bottles
        if: ${{ env.next_step == 'upload_and_create_pr' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: bag-of-goodies
          files: cbmc@*.tar.gz

      - name: Create Pull Request
        if: ${{ env.next_step == 'upload_and_create_pr' }}
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Add formula for CBMC ${{ env.CBMC_LATEST }}
          add-paths: Formula/cbmc@*.rb
          branch: cbmc-${{ env.CBMC_LATEST }}
          delete-branch: true
          title: 'Add formula for CBMC ${{ env.CBMC_LATEST }}'
          body: >
            Add brew formula for CBMC's latest release.
